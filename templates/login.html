{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{% static 'style.css' %}">
<title>Login — LearnHub</title>
</head>
<body style="display:block">

<div class="auth-wrapper">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon-big">🎓</div>
      <h2>Bem-vindo de volta</h2>
      <p>Entre na sua conta para continuar aprendendo</p>
    </div>

    {% if messages %}
    <div class="messages">
      {% for msg in messages %}
        <div class="alert {% if 'error' in msg.tags %}alert-error{% else %}alert-success{% endif %}">{{ msg }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" name="senha" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px">Entrar →</button>
    </form>

    <div class="divider">ou</div>

    <a href="/cadastro/" class="btn btn-secondary btn-block">Criar nova conta</a>

    <div class="auth-link">
      <a href="/">← Voltar para o início</a>
    </div>
  </div>
</div>

</body>
</html>
