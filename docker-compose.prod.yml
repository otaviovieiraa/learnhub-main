version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: learnhub_postgres_prod
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-learnhub_db}
      POSTGRES_USER: ${DATABASE_USER:-learnhub_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres_secure_password_here}
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./scripts/healthcheck-postgres.sh:/healthcheck.sh
    healthcheck:
      test: ["CMD", "sh", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - learnhub_network
    security_opt:
      - no-new-privileges:true

  web:
    build: .
    image: learnhub:latest
    container_name: learnhub_web_prod
    environment:
      - DEBUG=False
      - PORT=${APP_PORT:-3000}
      - DATABASE_ENGINE=${DATABASE_ENGINE:-django.db.backends.postgresql}
      - DATABASE_NAME=${DATABASE_NAME:-learnhub_db}
      - DATABASE_USER=${DATABASE_USER:-learnhub_user}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres_secure_password_here}
      - DATABASE_HOST=postgres
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
    ports:
      - "${HOST_WEB_PORT_PROD:-3010}:${APP_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - learnhub_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT}/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data_prod:
    driver: local

networks:
  learnhub_network:
    driver: bridge
